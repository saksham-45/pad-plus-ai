[mypy]
python_version = 3.12
strict = False
explicit_package_bases = True
ignore_missing_imports = True
disallow_untyped_defs = False
disallow_untyped_calls = False
warn_return_any = True
disable_error_code = type-arg, annotation-unchecked, no-untyped-def, no-untyped-call

[mypy-healer.api]
disable_error_code = union-attr, name-defined, no-untyped-def, no-any-return

[mypy-healer.viewer.viewer]
disable_error_code = no-untyped-def, assignment, return-value, operator, arg-type, dict-item, union-attr, no-any-return

[mypy-healer.diagnostics.*]
disable_error_code = union-attr, arg-type, return-value, index

[mypy-healer.diagnostics.integration_test]
disable_error_code = var-annotated

[mypy-healer.orchestrator]
disable_error_code = union-attr, no-untyped-def

[mypy-healer.patcher.patterns.*]
disable_error_code = arg-type, return-value

[mypy-healer.patcher.js_patcher]
disable_error_code = no-any-return

[mypy-aethon.xray.*]
disable_error_code = assignment, arg-type, return-value, no-any-return

[mypy-aethon.xray.data_sanitizer]
disable_error_code = call-overload

[mypy-aethon.xray.causal_validator]
disable_error_code = dict-item
