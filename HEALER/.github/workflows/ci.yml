name: HEALER CI

on:
  push:
    branches: [main, master]
    paths-ignore: ['docs/**', '**/*.md']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r dev-requirements.txt

      - name: Type check
        run: |
          python -m mypy healer/ aethon/ --ignore-missing-imports || true

      - name: Lint
        run: |
          python -m ruff check healer/ aethon/ || true

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Run integration tests
        run: |
          python -m healer.diagnostics.integration_test --verbose

      - name: Verify CLI runner works
        run: |
          python -m healer.diagnostics.runner --quiet --fail-on never 2>&1 | python -c "import sys,json;d=json.load(sys.stdin);assert 'reports' in d;print(f'CLI OK: {len(d[\"reports\"])} reports')"

  smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Smoke test
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from aethon.xray import start_trace, start_span, SpanKind
          from healer.diagnostics.report import DiagnosticReport, ReportSeverity, ReportCategory
          from healer.patcher.python_patcher import PythonPatcher
          from healer.verifier.result import VerificationResult, Verdict
          from healer.meta.meta_learner import MetaLearner, HealingRecord
          from healer.orchestrator import HealerOrchestrator, HealerMode
          print('SMOKE OK: all HEALER modules loaded')
          "
