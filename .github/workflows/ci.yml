name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov ruff mypy black
  
      - name: Run linters
        run: |
          echo "Running Ruff..."
          ruff check backend/ tests/
          
          echo "Running Black..."
          black --check backend/ tests/
          
          echo "Running MyPy..."
          mypy backend/ --ignore-missing-imports --no-error-summary
  
      - name: Run tests
        run: |
          pytest tests/ -v \
            --cov=backend \
            --cov-report=xml \
            --cov-report=term-missing \
            -m "not slow"
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          env_vars: OS,PYTHON
          name: codecov-umbrella
          fail_ci_if_error: false
  
  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Check imports
        run: |
          python -c "from backend.main import app; print('✅ Backend imports successfully')"
          python -c "from backend.core.pipeline import PipelineExecutor; print('✅ Pipeline imports successfully')"
          python -c "from backend.api.frontend_routes import router; print('✅ Routes imports successfully')"
      
      - name: Build successful
        run: echo "✅ Build completed successfully"
