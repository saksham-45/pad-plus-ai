services:
  - type: web
    name: pad-plus-ai
    runtime: python
    plan: starter
    buildCommand: |
      pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        sync: false
        # Supabase PostgreSQL: postgresql://postgres:password@db.<project>.supabase.co:5432/postgres
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: ENCRYPTION_SALT
        sync: false
      - key: CSRF_SECRET_KEY
        sync: false
      - key: REDIS_URL
        sync: false
        # Бесплатный Redis: https://console.upstash.com/ → Create Database → copy REDIS_URL
      - key: FRONTEND_URL
        value: https://pad-plus-ai.onrender.com
      - key: LOG_LEVEL
        value: info
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: BACKEND_PORT
        value: "8000"
      - key: RENDER
        value: "true"
