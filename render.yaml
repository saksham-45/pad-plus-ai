services:
  - type: web
    name: pad-plus-ai
    runtime: python
    plan: standard
    buildCommand: |
      pip install -r requirements.txt
      cd frontend
      npm install
      npm run build
      cd ..
      python scripts/apply_migrations.py
    startCommand: python backend/main.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: NODE_VERSION
        value: 20.10.0
      - key: DATABASE_URL
        fromDatabase:
          name: pad-plus-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: pad-plus-redis
          type: redis
          property: connectionString

  - type: redis
    name: pad-plus-redis
    ipAllowList: []
    plan: starter

databases:
  - name: pad-plus-db
    databaseName: padplus
    user: padplus
    plan: standard
    ipAllowList: []