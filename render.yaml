services:
  - type: web
    name: pad-plus-ai
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      python scripts/apply_migrations.py
      cd frontend
      npm install
      npm run build
      cd ..
    startCommand: python backend/main.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: NODE_VERSION
        value: 20.10.0
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: ENCRYPTION_SALT
        sync: false
      - key: CSRF_SECRET_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: FRONTEND_URL
        value: https://pad-plus-ai.onrender.com
      - key: LOG_LEVEL
        value: info
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: BACKEND_PORT
        value: "8000"
      - key: RENDER
        value: "true"
