[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --durations=10
    --basetemp=tests/tmp
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests
    api: API tests
    memory: Memory tests
    llm: LLM tests
    autonomy: Autonomy tests
    rag: RAG tests
    emotion: Emotion tests
    knowledge: Knowledge tests
    persona: Persona tests
    pipeline: Pipeline tests
    hygiene: Hygiene tests
    websocket: WebSocket tests
    event_bus: Event bus tests
    health: Health monitor tests
    meta_controller: Meta controller tests
    anti_directive: Anti directive tests
asyncio_mode = auto
